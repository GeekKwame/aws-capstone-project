# Nginx configuration template for Student Study Planner
# To be deployed on EC2 instances under /etc/nginx/conf.d/study-planner.conf

server {
    listen 80;
    server_name _;
    root /var/www/study-planner;
    index index.html;

    # Dynamic route fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for ALB target group probes
    location = /health.html {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
